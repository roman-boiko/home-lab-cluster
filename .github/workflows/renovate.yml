name: Renovate

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * 1"

permissions:
  contents: read

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Check Renovate token
        id: renovate-token
        env:
          RENOVATE_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
        run: |
          if [ -n "${RENOVATE_TOKEN}" ]; then
            echo "available=true" >> "${GITHUB_OUTPUT}"
          else
            echo "RENOVATE_TOKEN is not configured; skipping Renovate."
            echo "available=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Checkout
        if: steps.renovate-token.outputs.available == 'true'
        uses: actions/checkout@v4

      - name: Run Renovate
        if: steps.renovate-token.outputs.available == 'true'
        uses: renovatebot/github-action@v46.1.14
        with:
          configurationFile: renovate.json
          token: ${{ secrets.RENOVATE_TOKEN }}

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: authentik
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: home-lab
  source:
    repoURL: https://charts.goauthentik.io
    chart: authentik
    targetRevision: 2026.5.0
    helm:
      valuesObject:
        global:
          podAnnotations:
            home-lab.rboiko.com/authentik-secret-revision: "v4"
        authentik:
          existingSecret:
            secretName: authentik-secrets
          error_reporting:
            enabled: false
          postgresql:
            host: authentik-postgres-rw
            name: authentik
            user: authentik
        postgresql:
          enabled: false
        blueprints:
          configMaps:
            - home-lab-authentik-blueprints
        server:
          replicas: 1
          resources:
            requests:
              cpu: 100m
              memory: 384Mi
          route:
            main:
              enabled: true
              hostnames:
                - auth.home.rboiko.com
              parentRefs:
                - group: gateway.networking.k8s.io
                  kind: Gateway
                  name: public-https
                  namespace: gateway-system
                  sectionName: https-wildcard
        worker:
          replicas: 1
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
        serviceAccount:
          create: true
  destination:
    server: https://kubernetes.default.svc
    namespace: authentik
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 10
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - PruneLast=true

apiVersion: v1
kind: ConfigMap
metadata:
  name: home-lab-authentik-brand-blueprint
  namespace: authentik
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
data:
  home-lab-brand.yaml: |
    version: 1
    metadata:
      name: home-lab-brand
      labels:
        blueprints.goauthentik.io/description: Home lab Authentik brand
    entries:
      - id: home-lab-brand
        model: authentik_brands.brand
        identifiers:
          domain: auth.home.rboiko.com
        attrs:
          branding_title: Welcome to Roman's SSO page
          branding_logo: home-lab/robot-logo.svg
          branding_favicon: home-lab/robot-favicon.svg
          branding_custom_css: |
            :root {
              --ak-accent: #0f766e;
              --ak-accent-blue: #2563eb;
              --ak-neutral-bg: #f5f3ee;
              --ak-neutral-panel: rgba(255, 255, 255, 0.88);
              --ak-neutral-text: #1e293b;
              --ak-neutral-muted: #475569;
              --ak-neutral-input: #ffffff;
            }

            .pf-v5-c-login,
            .pf-c-login {
              background:
                radial-gradient(circle at 20% 20%, rgba(37, 99, 235, 0.12), transparent 28rem),
                radial-gradient(circle at 80% 10%, rgba(15, 118, 110, 0.14), transparent 26rem),
                linear-gradient(135deg, #f8f7f3 0%, var(--ak-neutral-bg) 50%, #e8ece9 100%) !important;
            }

            .pf-v5-c-login__main,
            .pf-c-login__main {
              --pf-v5-global--Color--100: var(--ak-neutral-text);
              --pf-v5-global--Color--200: var(--ak-neutral-muted);
              --pf-v5-c-form__label--Color: var(--ak-neutral-text);
              --pf-v5-c-form__label-text--Color: var(--ak-neutral-text);
              --pf-v5-c-form__label-required--Color: #b91c1c;
              --pf-global--Color--100: var(--ak-neutral-text);
              --pf-global--Color--200: var(--ak-neutral-muted);
              --pf-c-form__label--Color: var(--ak-neutral-text);
              --pf-c-form__label-text--Color: var(--ak-neutral-text);
              --pf-c-form__label-required--Color: #b91c1c;
              background: var(--ak-neutral-panel) !important;
              border: 1px solid rgba(100, 116, 139, 0.24) !important;
              border-radius: 24px !important;
              box-shadow: 0 24px 80px rgba(15, 23, 42, 0.14) !important;
              backdrop-filter: blur(14px);
              color: var(--ak-neutral-text) !important;
            }

            .pf-v5-c-login__main-header,
            .pf-v5-c-login__main-body,
            .pf-v5-c-login__main-footer,
            .pf-v5-c-login__main *:not(.pf-v5-c-button):not(.pf-c-button),
            .pf-c-login__main-header,
            .pf-c-login__main-body,
            .pf-c-login__main-footer,
            .pf-c-login__main *:not(.pf-v5-c-button):not(.pf-c-button) {
              color: var(--ak-neutral-text) !important;
            }

            .pf-v5-c-login label,
            .pf-v5-c-login label *,
            .pf-v5-c-login .pf-v5-c-form__label,
            .pf-v5-c-login .pf-v5-c-form__label-text,
            .pf-c-login label,
            .pf-c-login label *,
            .pf-c-login .pf-c-form__label,
            .pf-c-login .pf-c-form__label-text,
            ak-form-element-horizontal label,
            ak-form-element-horizontal .pf-v5-c-form__label,
            ak-form-element-horizontal .pf-v5-c-form__label-text {
              color: var(--ak-neutral-text) !important;
              opacity: 1 !important;
            }

            .pf-v5-c-login .pf-v5-c-form__label-required,
            .pf-c-login .pf-c-form__label-required,
            ak-form-element-horizontal .pf-v5-c-form__label-required {
              color: #b91c1c !important;
              opacity: 1 !important;
            }

            .pf-v5-c-form__helper-text,
            .pf-v5-c-helper-text,
            .pf-v5-c-login__main-footer-band,
            .pf-c-form__helper-text,
            .pf-c-helper-text,
            .pf-c-login__main-footer-band {
              color: var(--ak-neutral-muted) !important;
            }

            .pf-v5-c-form-control,
            .pf-c-form-control,
            input,
            textarea,
            select {
              background: var(--ak-neutral-input) !important;
              color: var(--ak-neutral-text) !important;
            }

            input::placeholder,
            textarea::placeholder {
              color: var(--ak-neutral-muted) !important;
              opacity: 1;
            }

            a,
            .pf-v5-c-login__main a,
            .pf-c-login__main a {
              color: var(--ak-accent) !important;
            }

            .pf-v5-c-button.pf-m-primary,
            .pf-c-button.pf-m-primary {
              background: linear-gradient(135deg, var(--ak-accent), var(--ak-accent-blue)) !important;
              border-radius: 999px !important;
              color: #ffffff !important;
            }

            img[alt="authentik Logo"],
            .pf-v5-c-brand,
            .pf-c-brand {
              max-height: 88px !important;
            }

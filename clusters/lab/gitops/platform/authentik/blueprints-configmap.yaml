apiVersion: v1
kind: ConfigMap
metadata:
  name: home-lab-authentik-blueprints
  namespace: authentik
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
data:
  home-lab-apps.yaml: |
    version: 1
    metadata:
      name: home-lab-apps
      labels:
        blueprints.goauthentik.io/description: Home lab applications and SSO providers
    entries:
      - id: home-lab-admins
        model: authentik_core.group
        identifiers:
          name: Home Lab Admins
        attrs:
          is_superuser: true

      - id: argocd-admins
        model: authentik_core.group
        identifiers:
          name: ArgoCD Admins

      - id: argocd-groups-scope
        model: authentik_providers_oauth2.scopemapping
        identifiers:
          managed: home-lab.rboiko.com/providers/oauth2/scope-groups
        attrs:
          name: Home Lab Argo CD groups
          scope_name: groups
          description: Group names for Argo CD RBAC.
          expression: |
            return {
                "groups": [group.name for group in request.user.ak_groups.all()],
            }

      - id: litellm-role-scope
        model: authentik_providers_oauth2.scopemapping
        identifiers:
          managed: home-lab.rboiko.com/providers/oauth2/scope-litellm-role
        attrs:
          name: Home Lab LiteLLM role
          scope_name: litellm_role
          description: LiteLLM role based on Authentik groups.
          expression: |
            groups = [group.name for group in request.user.ak_groups.all()]
            role = "proxy_admin" if "Home Lab Admins" in groups else "internal_user"
            return {
                "litellm_role": role,
            }

      - id: argocd-provider
        model: authentik_providers_oauth2.oauth2provider
        identifiers:
          name: Argo CD
        attrs:
          authentication_flow: !Find [authentik_flows.flow, [slug, default-authentication-flow]]
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow], [designation, invalidation]]
          client_type: confidential
          client_id: !Env ARGOCD_OIDC_CLIENT_ID
          client_secret: !Env ARGOCD_OIDC_CLIENT_SECRET
          grant_types:
            - authorization_code
            - refresh_token
          issuer_mode: per_provider
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
          sub_mode: user_username
          redirect_uris:
            - matching_mode: strict
              url: https://argocd.home.rboiko.com/auth/callback
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-email]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, home-lab.rboiko.com/providers/oauth2/scope-groups]]

      - model: authentik_core.application
        identifiers:
          slug: argocd
        attrs:
          name: Argo CD
          provider: !KeyOf argocd-provider
          meta_launch_url: https://argocd.home.rboiko.com
          policy_engine_mode: any

      - id: litellm-provider
        model: authentik_providers_oauth2.oauth2provider
        identifiers:
          name: LiteLLM
        attrs:
          authentication_flow: !Find [authentik_flows.flow, [slug, default-authentication-flow]]
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow], [designation, invalidation]]
          client_type: confidential
          client_id: !Env LITELLM_OIDC_CLIENT_ID
          client_secret: !Env LITELLM_OIDC_CLIENT_SECRET
          grant_types:
            - authorization_code
            - refresh_token
          issuer_mode: per_provider
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
          sub_mode: user_username
          redirect_uris:
            - matching_mode: strict
              url: https://llms.home.rboiko.com/sso/callback
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-email]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, home-lab.rboiko.com/providers/oauth2/scope-litellm-role]]

      - model: authentik_core.application
        identifiers:
          slug: litellm
        attrs:
          name: LiteLLM
          provider: !KeyOf litellm-provider
          meta_launch_url: https://llms.home.rboiko.com/ui
          policy_engine_mode: any

      - id: litellm-proxy-provider
        model: authentik_providers_proxy.proxyprovider
        identifiers:
          name: LiteLLM UI
        attrs:
          authentication_flow: !Find [authentik_flows.flow, [slug, default-authentication-flow]]
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow], [designation, invalidation]]
          mode: proxy
          external_host: https://llms.home.rboiko.com
          internal_host: http://litellm.litellm.svc:4000
          internal_host_ssl_validation: false
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/proxy/scope-proxy]]

      - model: authentik_core.application
        identifiers:
          slug: litellm-ui
        attrs:
          name: LiteLLM UI
          provider: !KeyOf litellm-proxy-provider
          meta_launch_url: https://llms.home.rboiko.com/ui
          policy_engine_mode: any

      - id: longhorn-provider
        model: authentik_providers_proxy.proxyprovider
        identifiers:
          name: Longhorn
        attrs:
          authentication_flow: !Find [authentik_flows.flow, [slug, default-authentication-flow]]
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow], [designation, invalidation]]
          mode: proxy
          external_host: https://longhorn.home.rboiko.com
          internal_host: http://longhorn-frontend.longhorn-system.svc
          internal_host_ssl_validation: false
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/proxy/scope-proxy]]

      - model: authentik_core.application
        identifiers:
          slug: longhorn
        attrs:
          name: Longhorn
          provider: !KeyOf longhorn-provider
          meta_launch_url: https://longhorn.home.rboiko.com
          policy_engine_mode: any

      - id: hubble-provider
        model: authentik_providers_proxy.proxyprovider
        identifiers:
          name: Hubble
        attrs:
          authentication_flow: !Find [authentik_flows.flow, [slug, default-authentication-flow]]
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow], [designation, invalidation]]
          mode: proxy
          external_host: https://hubble.home.rboiko.com
          internal_host: http://hubble-ui.kube-system.svc
          internal_host_ssl_validation: false
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/proxy/scope-proxy]]

      - model: authentik_core.application
        identifiers:
          slug: hubble
        attrs:
          name: Hubble
          provider: !KeyOf hubble-provider
          meta_launch_url: https://hubble.home.rboiko.com
          policy_engine_mode: any

      - model: authentik_outposts.outpost
        identifiers:
          managed: goauthentik.io/outposts/embedded
        attrs:
          providers:
            - !KeyOf litellm-proxy-provider
            - !KeyOf longhorn-provider
            - !KeyOf hubble-provider

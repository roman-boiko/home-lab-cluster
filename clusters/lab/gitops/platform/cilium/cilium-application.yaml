apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cilium
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: home-lab
  source:
    repoURL: https://helm.cilium.io
    chart: cilium
    targetRevision: 1.19.1
    helm:
      valuesObject:
        k8sServiceHost: 192.168.5.11
        k8sServicePort: 6443
        kubeProxyReplacement: true
        prometheus:
          enabled: true
        gatewayAPI:
          enabled: true
        envoy:
          prometheus:
            enabled: false
        hubble:
          enabled: true
          relay:
            enabled: true
          ui:
            enabled: true
        l2announcements:
          enabled: true
        k8sClientRateLimit:
          qps: 20
          burst: 40
        operator:
          replicas: 1
          prometheus:
            enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 10
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
    syncOptions:
      - ServerSideApply=true
      - PruneLast=true

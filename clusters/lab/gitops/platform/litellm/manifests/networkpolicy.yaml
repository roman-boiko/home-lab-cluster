apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: litellm
  namespace: litellm
spec:
  endpointSelector:
    matchLabels: {}
  ingress:
    # reserved:ingress is the Cilium Gateway API Envoy proxy that fronts the
    # private Gateway; host covers node-local traffic such as kubelet probes.
    - fromEntities:
        - ingress
        - host
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: cnpg-system
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: litellm
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: litellm
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: authentik
    - toEntities:
        - kube-apiserver
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP

apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  namespace: litellm
  labels:
    app.kubernetes.io/name: litellm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: litellm
  template:
    metadata:
      labels:
        app.kubernetes.io/name: litellm
    spec:
      containers:
        - name: litellm
          image: ghcr.io/berriai/litellm:v1.86.2
          imagePullPolicy: IfNotPresent
          args:
            - --config
            - /app/config.yaml
            - --port
            - "4000"
            - --host
            - 0.0.0.0
          ports:
            - name: http
              containerPort: 4000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: litellm-postgres-app
                  key: uri
            - name: PROXY_BASE_URL
              value: https://llms.home.rboiko.com
            - name: PROXY_LOGOUT_URL
              value: https://auth.home.rboiko.com/if/session-end/litellm/
            - name: GENERIC_AUTHORIZATION_ENDPOINT
              value: https://auth.home.rboiko.com/application/o/authorize/
            - name: GENERIC_TOKEN_ENDPOINT
              value: https://auth.home.rboiko.com/application/o/token/
            - name: GENERIC_USERINFO_ENDPOINT
              value: https://auth.home.rboiko.com/application/o/userinfo/
            - name: GENERIC_SCOPE
              value: openid profile email litellm_role
            - name: GENERIC_USER_ID_ATTRIBUTE
              value: preferred_username
            - name: GENERIC_USER_EMAIL_ATTRIBUTE
              value: email
            - name: GENERIC_USER_DISPLAY_NAME_ATTRIBUTE
              value: name
            - name: GENERIC_USER_ROLE_ATTRIBUTE
              value: litellm_role
          envFrom:
            - secretRef:
                name: litellm-runtime-secrets
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /health/liveliness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 6
          resources:
            requests:
              cpu: 250m
              memory: 768Mi
            limits:
              memory: 2Gi
      volumes:
        - name: config
          configMap:
            name: litellm-config

apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  namespace: litellm
  labels:
    app.kubernetes.io/name: litellm
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: litellm
  template:
    metadata:
      labels:
        app.kubernetes.io/name: litellm
      annotations:
        # Bump when config.yaml changes so the proxy reloads its model list.
        home-lab.rboiko.com/litellm-config-revision: "v3"
        ad.datadoghq.com/litellm.checks: |
          {
            "litellm": {
              "init_config": {},
              "instances": [
                {
                  "openmetrics_endpoint": "http://%%host%%:4000/metrics",
                  "litellm_health_endpoint": "http://%%host%%:4000/health/readiness",
                  "tags": ["service:litellm"]
                }
              ]
            }
          }
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: litellm
          image: ghcr.io/berriai/litellm:v1.86.2
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          args:
            - --config
            - /app/config.yaml
            - --port
            - "4000"
            - --host
            - 0.0.0.0
          ports:
            - name: http
              containerPort: 4000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: litellm-postgres-app
                  key: uri
            - name: PROXY_BASE_URL
              value: https://llms.home.rboiko.com
            - name: PROXY_LOGOUT_URL
              value: https://auth.home.rboiko.com/if/session-end/litellm/
            # Browser-facing endpoint stays external (the user's browser hits it).
            - name: GENERIC_AUTHORIZATION_ENDPOINT
              value: https://auth.home.rboiko.com/application/o/authorize/
            # Server-to-server endpoints use the in-cluster service so the
            # CiliumNetworkPolicy egress (to the authentik namespace) covers them.
            - name: GENERIC_TOKEN_ENDPOINT
              value: http://authentik-server.authentik.svc/application/o/token/
            - name: GENERIC_USERINFO_ENDPOINT
              value: http://authentik-server.authentik.svc/application/o/userinfo/
            - name: GENERIC_SCOPE
              value: openid profile email litellm_role
            - name: GENERIC_USER_ID_ATTRIBUTE
              value: preferred_username
            - name: GENERIC_USER_EMAIL_ATTRIBUTE
              value: email
            - name: GENERIC_USER_DISPLAY_NAME_ATTRIBUTE
              value: name
            - name: GENERIC_USER_ROLE_ATTRIBUTE
              value: litellm_role
          envFrom:
            - secretRef:
                name: litellm-runtime-secrets
            - secretRef:
                name: litellm-provider-keys
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /health/liveliness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 6
          resources:
            requests:
              cpu: 250m
              memory: 768Mi
            limits:
              memory: 2Gi
      volumes:
        - name: config
          configMap:
            name: litellm-config

apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: authentik-postgres
  namespace: authentik
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:17.10
  inheritedMetadata:
    annotations:
      ad.datadoghq.com/postgres.checks: |
        {
          "openmetrics": {
            "init_config": {},
            "instances": [
              {
                "openmetrics_endpoint": "http://%%host%%:9187/metrics",
                "namespace": "cnpg",
                "metrics": ["cnpg_*"],
                "tags": ["cnpg_cluster:authentik-postgres"]
              }
            ]
          }
        }
  bootstrap:
    initdb:
      database: authentik
      owner: authentik
      secret:
        name: authentik-secrets
  storage:
    storageClass: longhorn
    size: 8Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
  monitoring:
    enablePodMonitor: false

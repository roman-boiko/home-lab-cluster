apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: authentik-postgres
  namespace: authentik
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:17.10
  bootstrap:
    initdb:
      database: authentik
      owner: authentik
      secret:
        name: authentik-secrets
  storage:
    storageClass: longhorn
    size: 8Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
  monitoring:
    enablePodMonitor: false

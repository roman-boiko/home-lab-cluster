apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: home-lab-gateway
  namespace: gateway-system
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  secretName: home-lab-gateway-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - home.rboiko.com
    - "*.home.rboiko.com"


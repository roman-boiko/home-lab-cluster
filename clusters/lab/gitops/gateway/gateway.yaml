apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: public-https
  namespace: gateway-system
spec:
  gatewayClassName: cilium
  addresses:
    - type: IPAddress
      value: 192.168.5.100
  listeners:
    - name: https-wildcard
      hostname: "*.home.rboiko.com"
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - group: ""
            kind: Secret
            name: home-lab-gateway-tls
      allowedRoutes:
        namespaces:
          from: All
    - name: https-root
      hostname: home.rboiko.com
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - group: ""
            kind: Secret
            name: home-lab-gateway-tls
      allowedRoutes:
        namespaces:
          from: All

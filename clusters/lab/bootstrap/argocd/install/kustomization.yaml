apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - https://raw.githubusercontent.com/argoproj/argo-cd/v3.4.2/manifests/install.yaml
  - argocd-route.yaml
patches:
  - target:
      kind: ConfigMap
      name: argocd-cmd-params-cm
    patch: |-
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: argocd-cmd-params-cm
      data:
        server.insecure: "true"
  - target:
      kind: ConfigMap
      name: argocd-cm
    patch: |-
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: argocd-cm
      data:
        url: https://argocd.home.rboiko.com
        oidc.config: |
          name: authentik
          issuer: https://auth.home.rboiko.com/application/o/argocd/
          clientID: argocd
          clientSecret: $authentik-oidc:clientSecret
          requestedScopes:
            - openid
            - profile
            - email
            - groups
  - target:
      kind: ConfigMap
      name: argocd-rbac-cm
    patch: |-
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: argocd-rbac-cm
      data:
        policy.csv: |
          g, ArgoCD Admins, role:admin
          g, Home Lab Admins, role:admin
        scopes: '[groups]'
  - target:
      kind: Deployment
      name: argocd-server
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: argocd-server
      spec:
        template:
          metadata:
            annotations:
              home-lab.rboiko.com/config-revision: "server-insecure-authentik-oidc-v1"
  - target:
      kind: Deployment
      labelSelector: app.kubernetes.io/part-of=argocd
    patch: |-
      - op: add
        path: /spec/template/spec/dnsConfig
        value:
          options:
            - name: ndots
              value: "1"
  - target:
      kind: StatefulSet
      labelSelector: app.kubernetes.io/part-of=argocd
    patch: |-
      - op: add
        path: /spec/template/spec/dnsConfig
        value:
          options:
            - name: ndots
              value: "1"

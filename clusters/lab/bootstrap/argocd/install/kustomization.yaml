apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - https://raw.githubusercontent.com/argoproj/argo-cd/v3.4.2/manifests/install.yaml
patches:
  - target:
      kind: Deployment
      labelSelector: app.kubernetes.io/part-of=argocd
    patch: |-
      - op: add
        path: /spec/template/spec/dnsConfig
        value:
          options:
            - name: ndots
              value: "1"
  - target:
      kind: StatefulSet
      labelSelector: app.kubernetes.io/part-of=argocd
    patch: |-
      - op: add
        path: /spec/template/spec/dnsConfig
        value:
          options:
            - name: ndots
              value: "1"

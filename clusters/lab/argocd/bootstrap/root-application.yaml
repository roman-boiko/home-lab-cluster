apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: home-lab-cluster
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: home-lab
  source:
    repoURL: https://github.com/roman-boiko/home-lab-cluster.git
    targetRevision: main
    path: clusters/lab/gitops
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - PruneLast=true


---
- name: Set k3s server endpoint
  ansible.builtin.set_fact:
    k3s_server_host: "{{ hostvars[groups['k3s_servers'][0]].ansible_host | default(groups['k3s_servers'][0]) }}"

- name: Wait for k3s server API from agent
  ansible.builtin.wait_for:
    host: "{{ k3s_server_host }}"
    port: 6443
    timeout: 180

- name: Read k3s node token from server
  ansible.builtin.slurp:
    src: /var/lib/rancher/k3s/server/node-token
  delegate_to: "{{ groups['k3s_servers'][0] }}"
  become: true
  run_once: true
  register: k3s_node_token

- name: Download k3s installer
  ansible.builtin.get_url:
    url: "{{ k3s_install_url }}"
    dest: /usr/local/bin/k3s-install.sh
    mode: "0755"

- name: Install k3s agent
  ansible.builtin.command: /usr/local/bin/k3s-install.sh
  args:
    creates: /etc/systemd/system/k3s-agent.service
  environment: "{{ {'K3S_URL': 'https://' + k3s_server_host + ':6443', 'K3S_TOKEN': (k3s_node_token.content | b64decode | trim), 'INSTALL_K3S_EXEC': ('agent ' + (k3s_agent_args | join(' '))) | trim} | combine((k3s_version | length > 0) | ternary({'INSTALL_K3S_VERSION': k3s_version}, {})) }}"

- name: Ensure k3s agent is running
  ansible.builtin.systemd:
    name: k3s-agent
    enabled: true
    state: started

